<section class="cards">
  {% for item in integration_configs %}
    <article class="card stat-card">
      <span>{{ item.provider }}</span>
      <strong>{{ item.last_sync_status or 'sem sync' }}</strong>
      <p class="muted">{{ item.last_sync_at or '-' }} | auto-sync {{ 'ativo' if item.auto_sync_enabled else 'desligado' }} | {{ item.sync_hours or '-' }}</p>
    </article>
  {% endfor %}
</section>
